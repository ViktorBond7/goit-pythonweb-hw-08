services:
  postgres:
    image: postgres:16-alpine
    container_name: hw8_postgres
    # restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db_contacts
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # healthcheck:
    #   test: ["CMD-SHELL", "pg_isready -U admin -d db_contacts"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 10

volumes:
  postgres_data:
